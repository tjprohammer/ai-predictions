version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: mlb-predictor-db
    environment:
      POSTGRES_USER: mlbuser
      POSTGRES_PASSWORD: mlbpass
      POSTGRES_DB: mlb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlbuser -d mlb"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: mlb-predictor-adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

