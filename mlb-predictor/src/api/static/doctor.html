<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLB Predictor Doctor</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #f6f0e8;
        --panel: rgba(255, 251, 246, 0.92);
        --line: rgba(20, 33, 25, 0.12);
        --ink: #142119;
        --muted: #5f6e65;
        --accent: #0b6a58;
        --accent-deep: #0a4a3f;
        --good: #166534;
        --warn: #92400e;
        --bad: #991b1b;
        --shadow: 0 22px 64px rgba(20, 33, 25, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(11, 106, 88, 0.15),
            transparent 32%
          ),
          radial-gradient(
            circle at 85% 14%,
            rgba(183, 121, 31, 0.12),
            transparent 20%
          ),
          linear-gradient(180deg, #fcf9f4 0%, var(--bg) 100%);
        font-family: "Bahnschrift", "Aptos", "Segoe UI Variable", sans-serif;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 20px 44px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
        padding: 12px 14px;
        border-radius: 999px;
        background: rgba(255, 251, 246, 0.82);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .brand-link,
      .nav-link {
        text-decoration: none;
      }

      .brand-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-deep) 100%
        );
        color: white;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(20, 33, 25, 0.08);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav-icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
      }

      .nav-icon svg {
        width: 100%;
        height: 100%;
        display: block;
        fill: currentColor;
      }

      .nav-link:hover {
        transform: translateY(-1px);
        border-color: rgba(11, 106, 88, 0.22);
        color: var(--accent-deep);
        background: rgba(11, 106, 88, 0.08);
      }

      .nav-link.active {
        background: var(--accent);
        color: white;
        border-color: transparent;
        box-shadow: 0 12px 24px rgba(11, 106, 88, 0.2);
      }

      .nav-link.active:hover {
        background: var(--accent-deep);
        color: white;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 22px 24px;
        margin-bottom: 18px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 3rem);
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 60ch;
      }

      .summary-grid,
      .check-grid,
      .detail-grid {
        display: grid;
        gap: 14px;
      }

      .summary-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-bottom: 18px;
      }

      .check-grid {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        margin-bottom: 18px;
      }

      .detail-grid {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
      }

      .card h2,
      .card h3 {
        margin: 0 0 10px;
      }

      .label {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .metric {
        font-size: 1.8rem;
        font-weight: 800;
      }

      .status-ok {
        color: var(--good);
      }

      .status-warn {
        color: var(--warn);
      }

      .status-error {
        color: var(--bad);
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      li + li {
        margin-top: 8px;
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="topbar" aria-label="Primary">
        <a class="brand-link" data-app-link="" href=".">
          <span class="brand-mark">MP</span>
          <span>MLB Predictor</span>
        </a>
        <div class="nav-links">
          <a class="nav-link" data-app-link="" href="."
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M3 5h8v6H3zm10 0h8v6h-8zM3 13h8v6H3zm10 0h8v6h-8z"
                /></svg></span
            ><span>Game Board</span></a
          >
          <a class="nav-link" data-app-link="hot-hitters" href="hot-hitters"
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M13.5 2.5c.3 2.7-1 4.6-2.6 6.2-1.1 1.1-1.7 2.3-1.7 3.7 0 1.9 1.3 3.4 3.2 3.4 2.3 0 3.8-2 3.8-4.5 0-.8-.1-1.6-.5-2.5 2.3 1.3 4.3 4 4.3 7.1 0 4.1-3.3 7.1-8 7.1-4.6 0-8-2.9-8-7.4 0-3.3 1.7-5.5 4.1-7.5 2.4-1.9 4.8-3.8 5.4-5.6z"
                /></svg></span
            ><span>Hot Hitters</span></a
          >
          <a class="nav-link" data-app-link="totals" href="totals"
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M4 6h16v3H4zm0 5h10v3H4zm0 5h7v3H4zm12.5-7.5L19 11l4-5"
                /></svg></span
            ><span>Totals</span></a
          >
          <a class="nav-link" data-app-link="pitchers" href="pitchers"
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M15.5 2 8 9.5l1.4 1.4 2.6-2.6 3.7 3.7c.4.4 1 .6 1.5.6H19v1.8l3 3V11.8c0-.6-.2-1.1-.6-1.5L17.7 6.6l2.6-2.6zM3 19.5A2.5 2.5 0 0 0 5.5 22 2.5 2.5 0 0 0 8 19.5 2.5 2.5 0 0 0 5.5 17 2.5 2.5 0 0 0 3 19.5z"
                /></svg></span
            ><span>Pitcher Ks</span></a
          >
          <a class="nav-link" data-app-link="results" href="results"
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M5 4h14v2H5zm0 5h14v2H5zm0 5h9v2H5zm11.5 1.5 1.6 1.6L22 13.2"
                /></svg></span
            ><span>Daily Results</span></a
          >
          <a class="nav-link" data-app-link="experiments" href="experiments"
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M7 2v2h1v5.17A3 3 0 0 0 5 12v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a3 3 0 0 0-3-3.17V4h1V2H7zm3 2h4v4.5l1.5 1.5H8.5L10 8.5V4z"
                /></svg></span
            ><span>Experiments</span></a
          >
          <a
            class="nav-link active"
            data-app-link="doctor"
            href="doctor"
            aria-current="page"
            ><span class="nav-icon" aria-hidden="true"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M12 2 4 6v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V6zm0 4.3a2.2 2.2 0 1 1 0 4.4 2.2 2.2 0 0 1 0-4.4zm3.4 10H8.6v-1.2c0-1.9 1.5-3.4 3.4-3.4h0c1.9 0 3.4 1.5 3.4 3.4z"
                /></svg></span
            ><span>Doctor</span></a
          >
        </div>
      </nav>

      <section class="hero">
        <h1>Runtime Doctor</h1>
        <p>
          Aggregated runtime checks for the local database, model artifacts,
          readiness, source health, and recent pipeline activity.
        </p>
      </section>

      <section class="summary-grid" id="summaryGrid"></section>
      <section class="check-grid" id="checksGrid"></section>
      <section class="detail-grid" id="detailsGrid"></section>
    </main>

    <script>
      function statusClass(value) {
        if (value === "ok") return "status-ok";
        if (value === "warn") return "status-warn";
        return "status-error";
      }

      function card(title, body) {
        return `<article class="card"><h3>${title}</h3>${body}</article>`;
      }

      async function loadDoctor() {
        const response = await fetch("/api/doctor");
        const payload = await response.json();
        const overall = payload.overall || {};
        const readiness = (payload.game_readiness || {}).summary || {};
        const sourceHealth = (payload.source_health || {}).summary || {};
        const recentJobs = (payload.update_jobs || {}).recent_jobs || [];
        const pipelineRuns = (payload.pipeline_runs || {}).runs || [];

        document.getElementById("summaryGrid").innerHTML = [
          card(
            "Overall",
            `<div class="label">Status</div><div class="metric ${statusClass(overall.status)}">${String(overall.status || "unknown").toUpperCase()}</div><div class="muted">${overall.critical_failures || 0} critical, ${overall.warning_failures || 0} warning</div>`,
          ),
          card(
            "Target Date",
            `<div class="label">Slate</div><div class="metric">${payload.target_date || "-"}</div><div class="muted">DB: ${(payload.runtime || {}).db_dialect || "unknown"}</div>`,
          ),
          card(
            "Readiness",
            `<div class="label">Games</div><div class="metric">${readiness.total || 0}</div><div class="muted">Green ${readiness.green || 0} | Yellow ${readiness.yellow || 0} | Red ${readiness.red || 0}</div>`,
          ),
          card(
            "Source Health",
            `<div class="label">Recent Failures</div><div class="metric">${sourceHealth.sources_with_failures || 0}</div><div class="muted">Across ${sourceHealth.total_sources || 0} tracked sources</div>`,
          ),
        ].join("");

        document.getElementById("checksGrid").innerHTML = (payload.checks || [])
          .map((check) =>
            card(
              check.label,
              `<div class="label">${check.severity}</div><div class="metric ${check.ok ? "status-ok" : "status-error"}">${check.ok ? "PASS" : "FAIL"}</div><div class="muted">${check.detail}</div>`,
            ),
          )
          .join("");

        document.getElementById("detailsGrid").innerHTML = [
          card(
            "Recent Pipeline Runs",
            pipelineRuns.length
              ? `<ul>${pipelineRuns
                  .map(
                    (run) =>
                      `<li>${run.label || run.action || run.job_id}: ${run.status || "unknown"}</li>`,
                  )
                  .join("")}</ul>`
              : '<div class="muted">No recent pipeline runs recorded.</div>',
          ),
          card(
            "Recent Update Jobs",
            recentJobs.length
              ? `<ul>${recentJobs
                  .map(
                    (job) =>
                      `<li>${job.label || job.action || job.job_id}: ${job.status || "unknown"}</li>`,
                  )
                  .join("")}</ul>`
              : '<div class="muted">No recent update jobs recorded.</div>',
          ),
          card(
            "Runtime Paths",
            `<ul><li>DB: ${(payload.runtime || {}).database_url || "-"}</li><li>Data: ${(payload.runtime || {}).data_dir || "-"}</li><li>Models: ${(payload.runtime || {}).model_dir || "-"}</li></ul>`,
          ),
        ].join("");
      }

      loadDoctor().catch((error) => {
        document.getElementById("detailsGrid").innerHTML = card(
          "Doctor Load Failed",
          `<div class="muted">${error}</div>`,
        );
      });
    </script>
  </body>
</html>
