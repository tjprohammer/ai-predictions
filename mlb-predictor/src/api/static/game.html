<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLB Predictor Matchup Detail</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #f6f0e8;
        --panel: rgba(255, 251, 246, 0.9);
        --panel-strong: rgba(255, 251, 246, 0.97);
        --ink: #142119;
        --muted: #5f6e65;
        --line: rgba(20, 33, 25, 0.12);
        --accent: #0b6a58;
        --accent-deep: #0a4a3f;
        --good: #166534;
        --warn: #92400e;
        --bad: #991b1b;
        --shadow: 0 22px 64px rgba(20, 33, 25, 0.09);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(11, 106, 88, 0.15), transparent 32%),
          radial-gradient(circle at 85% 14%, rgba(183, 121, 31, 0.12), transparent 20%),
          linear-gradient(180deg, #fcf9f4 0%, var(--bg) 100%);
        font-family: "Bahnschrift", "Aptos", "Segoe UI Variable", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.24) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
        background-size: 26px 26px;
        opacity: 0.28;
      }

      main {
        max-width: 1480px;
        margin: 0 auto;
        padding: 28px 20px 44px;
        position: relative;
        z-index: 1;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
        padding: 12px 14px;
        border-radius: 999px;
        background: rgba(255, 251, 246, 0.82);
        backdrop-filter: blur(12px);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        position: sticky;
        top: 16px;
        z-index: 4;
      }

      .brand-link,
      .nav-link,
      .button-link {
        text-decoration: none;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
      }

      .brand-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
        color: white;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        box-shadow: 0 10px 24px rgba(11, 106, 88, 0.22);
      }

      .nav-links { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

      .nav-link,
      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(20, 33, 25, 0.08);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav-link:hover,
      .button-link:hover { transform: translateY(-1px); color: var(--accent-deep); background: rgba(11, 106, 88, 0.08); }
      .nav-link.active { background: var(--accent); color: white; border-color: transparent; }

      .hero-card,
      .panel,
      .lineup-panel,
      .starter-card,
      .summary-card {
        background: var(--panel);
        backdrop-filter: blur(12px);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        border-radius: var(--radius-xl);
      }

      .hero-card {
        padding: 28px;
        margin-bottom: 18px;
        background:
          linear-gradient(135deg, rgba(11, 106, 88, 0.16), rgba(255, 251, 245, 0.72) 35%, rgba(183, 121, 31, 0.1) 100%),
          var(--panel-strong);
      }

      .panel, .lineup-panel, .starter-card, .summary-card { padding: 22px; }
      .hero-grid, .summary-grid, .starter-grid, .lineup-grid, .meta-grid { display: grid; gap: 16px; }
      .hero-grid { grid-template-columns: 1.3fr 0.9fr; }
      .summary-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 18px; }
      .starter-grid, .lineup-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-bottom: 18px; }
      .meta-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      .eyebrow,
      .chip,
      .status-chip,
      .section-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        border: 1px solid rgba(22, 36, 29, 0.08);
        background: rgba(255,255,255,0.78);
        color: var(--accent-deep);
      }

      .chip.good, .status-chip.good { background: rgba(22, 101, 52, 0.12); color: var(--good); }
      .chip.warn, .status-chip.warn { background: rgba(183, 121, 31, 0.12); color: var(--warn); }
      .chip.bad, .status-chip.bad { background: rgba(153, 27, 27, 0.1); color: var(--bad); }

      h1, h2, h3, p { margin: 0; }
      h1 {
        margin-top: 14px;
        font-family: "Iowan Old Style", "Book Antiqua", Georgia, serif;
        font-size: clamp(2.2rem, 3.2vw, 3.6rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero-copy, .muted, .empty-state, .small-copy, .data-copy { color: var(--muted); line-height: 1.55; }
      .hero-copy { margin-top: 12px; max-width: 60ch; font-size: 1rem; }
      .hero-head, .hero-actions, .starter-head, .lineup-head, .lineup-row, .data-row { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
      .hero-actions { margin-top: 18px; }
      .summary-value, .big-value { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.03em; }
      .data-stack { display: grid; gap: 10px; }
      .data-label, .metric-label { font-size: 0.74rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
      .data-value { font-weight: 700; }
      .lineup-list { display: grid; gap: 12px; margin-top: 14px; }
      .lineup-row { padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--line); background: rgba(255,255,255,0.78); align-items: flex-start; }
      .lineup-main { display: grid; gap: 4px; }
      .lineup-title { font-weight: 800; font-size: 1rem; }
      .lineup-meta { color: var(--muted); font-size: 0.92rem; }
      .history-block { display: grid; gap: 8px; margin-top: 10px; }
      .history-caption { color: var(--muted); font-size: 0.8rem; }
      .history-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(76px, 1fr)); gap: 8px; }
      .history-tile { padding: 9px 10px; border-radius: 14px; border: 1px solid var(--line); display: grid; gap: 4px; }
      .history-tile.hit { background: rgba(22, 101, 52, 0.12); border-color: rgba(22, 101, 52, 0.22); }
      .history-tile.miss { background: rgba(153, 27, 27, 0.08); border-color: rgba(153, 27, 27, 0.18); }
      .history-date { color: var(--muted); font-size: 0.72rem; font-weight: 700; }
      .history-result { font-size: 0.95rem; font-weight: 800; }
      .history-detail { color: var(--muted); font-size: 0.72rem; }
      .loading-card { padding: 28px; text-align: center; }

      @media (max-width: 1100px) {
        .hero-grid, .summary-grid, .starter-grid, .lineup-grid, .meta-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <a class="brand-link" data-app-link="" href="#">
          <span class="brand-mark">MLB</span>
          <span>MLB Predictor</span>
        </a>
        <nav class="nav-links">
          <a class="nav-link" data-app-link="" href="#">Dashboard</a>
          <a class="nav-link" data-app-link="totals" href="#">Totals</a>
          <a class="nav-link" data-app-link="hot-hitters" href="#">Hot Hitters</a>
          <a class="nav-link" data-app-link="pitchers" href="#">Pitchers</a>
        </nav>
      </header>

      <section class="hero-card">
        <div class="hero-grid">
          <div>
            <div class="eyebrow" id="heroEyebrow">Matchup detail</div>
            <h1 id="heroTitle">Loading matchup…</h1>
            <p class="hero-copy" id="heroCopy">Fetching lineups, starters, totals context, and matchup detail.</p>
            <div class="hero-actions">
              <a class="button-link" id="backToBoardLink" href="#">Back To Board</a>
              <label class="button-link" for="targetDate">Slate Date</label>
              <input id="targetDate" type="date" />
            </div>
          </div>
          <div class="meta-grid">
            <article class="summary-card">
              <div class="data-label">Status</div>
              <div class="big-value" id="statusValue">-</div>
              <div class="data-copy" id="statusCopy">Game status pending</div>
            </article>
            <article class="summary-card">
              <div class="data-label">Venue / Start</div>
              <div class="big-value" id="venueValue">-</div>
              <div class="data-copy" id="venueCopy">Venue detail pending</div>
            </article>
          </div>
        </div>
      </section>

      <section class="summary-grid" id="summaryGrid"></section>
      <section class="starter-grid" id="starterGrid"></section>
      <section class="lineup-grid" id="lineupGrid"></section>

      <section class="panel" id="notesPanel">
        <div class="lineup-head">
          <div>
            <div class="section-tag">Context</div>
            <h2>Why This Matchup Matters</h2>
          </div>
        </div>
        <div class="data-stack" id="notesStack"></div>
      </section>
    </main>

    <script>
      function localDateValue() {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        return new Date(now.getTime() - offset).toISOString().slice(0, 10);
      }

      function detectAppBase() {
        const pathname = window.location.pathname || "/";
        if (pathname === "/") return "/";
        const segments = pathname.split("/").filter(Boolean);
        if (segments.length <= 1) return "/";
        return `/${segments.slice(0, -1).join("/")}/`;
      }

      const appBase = detectAppBase();
      function appUrl(path = "") {
        const normalizedBase = appBase.endsWith("/") ? appBase : `${appBase}/`;
        return new URL(path, `${window.location.origin}${normalizedBase}`).toString();
      }

      function applyAppLinks() {
        document.querySelectorAll("[data-app-link]").forEach((link) => {
          link.href = appUrl(link.dataset.appLink || "");
        });
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
      }

      function numberOr(value, fallback = null) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function formatNumber(value, digits = 2) {
        const number = numberOr(value);
        return number == null ? "-" : number.toFixed(digits);
      }

      function formatInteger(value) {
        const number = numberOr(value);
        return number == null ? "-" : `${Math.round(number)}`;
      }

      function formatPercent(value, digits = 0) {
        const number = numberOr(value);
        return number == null ? "-" : `${(number * 100).toFixed(digits)}%`;
      }

      function formatBattingAverage(value) {
        const number = numberOr(value);
        return number == null ? "-" : number.toFixed(3).replace(/^0/, "");
      }

      function formatShortDate(value) {
        if (!value) return "-";
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) return String(value);
        return parsed.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      }

      function formatDateTime(value) {
        if (!value) return "TBD";
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) return String(value);
        return parsed.toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
      }

      function lineupStatusChip(player) {
        if (player.is_confirmed_lineup) return '<span class="status-chip good">Confirmed</span>';
        if (player.is_inferred_lineup) return '<span class="status-chip warn">Inferred</span>';
        return '<span class="status-chip warn">Projected</span>';
      }

      function formatLineupSourceName(value) {
        const normalized = String(value || "").trim().toLowerCase();
        if (!normalized) return "Snapshot";
        if (normalized === "projected_template") return "Projected template";
        if (normalized === "manual_template") return "Manual template";
        return normalized
          .split(/[_-]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function latestLineupSnapshot(teamDetail) {
        const lineup = Array.isArray(teamDetail?.lineup) ? teamDetail.lineup : [];
        const snapshots = lineup.map((player) => player.lineup_snapshot_ts).filter(Boolean).sort();
        return snapshots.length ? snapshots[snapshots.length - 1] : null;
      }

      function summarizeLineupSource(teamDetail) {
        if (teamDetail?.confirmed_lineup) return "Confirmed lineup";
        const lineup = Array.isArray(teamDetail?.lineup) ? teamDetail.lineup : [];
        const sourceNames = [...new Set(lineup.map((player) => String(player.lineup_source_name || "").trim().toLowerCase()).filter(Boolean))];
        if (sourceNames.includes("projected_template")) return "Projected template lineup";
        if (sourceNames.includes("manual_template")) return "Manual template lineup";
        if (sourceNames.length === 1) return `${formatLineupSourceName(sourceNames[0])} lineup snapshot`;
        if (sourceNames.length > 1) return "Mixed lineup snapshots";
        if (lineup.some((player) => player.has_lineup_snapshot)) return "Latest lineup snapshot";
        return "Projected lineup";
      }

      function recentHistoryStrip(player) {
        const history = Array.isArray(player?.recent_hit_history) ? player.recent_hit_history : [];
        if (!history.length) return "";
        const hitGames = history.filter((game) => game.had_hit).length;
        const totalBases = history.reduce((sum, game) => sum + (numberOr(game.total_bases, 0) ?? 0), 0);
        const homeRuns = history.reduce((sum, game) => sum + (numberOr(game.home_runs, 0) ?? 0), 0);
        return `
          <div class="history-block">
            <div class="history-caption">Last ${history.length} Games · ${hitGames}/${history.length} hit games · ${formatInteger(totalBases)} TB · ${formatInteger(homeRuns)} HR · Green = hit · red = no hit</div>
            <div class="history-grid">
              ${history.map((game) => {
                const hits = numberOr(game.hits, 0) ?? 0;
                const totalBasesValue = numberOr(game.total_bases, 0) ?? 0;
                const homeRunsValue = numberOr(game.home_runs, 0) ?? 0;
                return `
                  <div class="history-tile ${game.had_hit ? "hit" : "miss"}">
                    <div class="history-date">${escapeHtml(formatShortDate(game.game_date))}</div>
                    <div class="history-result">${hits > 0 ? `${hits}H` : "0H"}</div>
                    <div class="history-detail">${formatInteger(totalBasesValue)} TB${homeRunsValue > 0 ? ` · ${formatInteger(homeRunsValue)} HR` : ""}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      function starterCard(starter, fallbackTeam, opponentTeam) {
        if (!starter) {
          return `<article class="starter-card"><div class="section-tag">${escapeHtml(fallbackTeam)}</div><h3>Starter pending</h3><p class="data-copy">No starter detail is loaded yet.</p></article>`;
        }
        const recent = starter.recent_form || {};
        const market = starter.k_projection?.market || {};
        return `
          <article class="starter-card">
            <div class="starter-head">
              <div>
                <div class="section-tag">${escapeHtml(starter.team || fallbackTeam)}</div>
                <h3>${escapeHtml(starter.pitcher_name || "Starter")}</h3>
              </div>
              <span class="chip ${starter.is_probable ? "good" : "warn"}">${starter.throws ? `${escapeHtml(starter.throws)}HP` : "Hand -"}${starter.days_rest == null ? "" : ` · ${starter.days_rest}d rest`}</span>
            </div>
            <div class="data-stack">
              <div class="data-row"><span class="data-label">Opponent</span><span class="data-value">${escapeHtml(opponentTeam)}</span></div>
              <div class="data-row"><span class="data-label">Recent IP / K</span><span class="data-value">${formatNumber(recent.avg_ip, 1)} / ${formatNumber(recent.avg_strikeouts, 1)}</span></div>
              <div class="data-row"><span class="data-label">Last Start</span><span class="data-value">${escapeHtml(formatShortDate(recent.last_start_date))}</span></div>
              <div class="data-row"><span class="data-label">xwOBA / CSW</span><span class="data-value">${formatNumber(starter.xwoba_against, 3)} / ${formatPercent(starter.csw_pct)}</span></div>
              <div class="data-row"><span class="data-label">K Projection</span><span class="data-value">${formatNumber(starter.k_projection?.projected_strikeouts, 2)}${numberOr(market.consensus_line) == null ? "" : ` vs ${formatNumber(market.consensus_line, 1)}`}</span></div>
            </div>
          </article>
        `;
      }

      function lineupPanel(teamDetail) {
        const lineup = Array.isArray(teamDetail?.lineup) ? teamDetail.lineup : [];
        const lineupSource = summarizeLineupSource(teamDetail);
        const lineupSnapshot = latestLineupSnapshot(teamDetail);
        return `
          <article class="lineup-panel">
            <div class="lineup-head">
              <div>
                <div class="section-tag">${escapeHtml(teamDetail?.team || "Team")}</div>
                <h2>Lineup and hitter context</h2>
              </div>
              <span class="chip ${teamDetail?.confirmed_lineup ? "good" : "warn"}">${teamDetail?.confirmed_lineup ? "Confirmed order" : "Projected or snapshot order"}</span>
            </div>
            <div class="data-stack">
              <div class="data-row"><span class="data-label">Recent offense</span><span class="data-value">${formatNumber(teamDetail?.recent_offense?.runs_per_game, 2)} RPG · ${formatNumber(teamDetail?.recent_offense?.xwoba, 3)} xwOBA · ${formatPercent(teamDetail?.recent_offense?.k_pct)}</span></div>
              <div class="data-row"><span class="data-label">Lineup source</span><span class="data-value">${escapeHtml(lineupSource)}${lineupSnapshot ? ` · ${escapeHtml(formatDateTime(lineupSnapshot))}` : ""}</span></div>
              <div class="data-row"><span class="data-label">Last result</span><span class="data-value">${escapeHtml(teamDetail?.last_result?.summary || "No recent result loaded")}</span></div>
            </div>
            <div class="lineup-list">
              ${lineup.length ? lineup.map((player) => `
                <div class="lineup-row">
                  <div class="lineup-main">
                    <div class="lineup-title">${escapeHtml(player.lineup_slot ?? "-")} · ${escapeHtml(player.player_name || "Player")}</div>
                    <div class="lineup-meta">${escapeHtml([player.position || "-", player.bats ? `${player.bats}HB` : "Bats -", player.opponent ? `vs ${player.opponent}` : "Opp TBD"].join(" | "))}</div>
                    <div class="lineup-meta">Hit prob ${formatPercent(player.predicted_hit_probability)} · Season BA ${formatBattingAverage(player.batting_avg_season)} · Last 7 BA ${formatBattingAverage(player.batting_avg_last7)}</div>
                    ${recentHistoryStrip(player)}
                  </div>
                  ${lineupStatusChip(player)}
                </div>
              `).join("") : '<div class="empty-state">No lineup detail is loaded for this side yet.</div>'}
            </div>
          </article>
        `;
      }

      function renderSummary(detail) {
        const totals = detail.totals || {};
        const actual = detail.actual_result || {};
        const weather = detail.weather || {};
        const venue = detail.venue || {};
        document.getElementById("heroEyebrow").textContent = `${formatDateTime(detail.game_start_ts)} · ${detail.status || "Status pending"}`;
        document.getElementById("heroTitle").textContent = `${detail.away_team} at ${detail.home_team}`;
        document.getElementById("heroCopy").textContent = `This page keeps the full matchup context in one place: totals prediction, starters, venue/weather, and lineup detail with batting-order slots plus recent hit history, total bases, and home runs.`;
        document.getElementById("statusValue").textContent = actual.is_final ? `${actual.total_runs ?? "-"} runs` : String(detail.status || "Pending");
        document.getElementById("statusCopy").textContent = actual.is_final ? `${detail.away_team} ${actual.away_runs ?? "-"}, ${detail.home_team} ${actual.home_runs ?? "-"}` : "Game outcome pending";
        document.getElementById("venueValue").textContent = escapeHtml(venue.name || "Venue TBD");
        document.getElementById("venueCopy").textContent = `${formatDateTime(detail.game_start_ts)} · ${[venue.city, venue.state].filter(Boolean).join(", ") || "Location pending"}`;
        document.getElementById("summaryGrid").innerHTML = `
          <article class="summary-card"><div class="data-label">Model / Market</div><div class="summary-value">${formatNumber(totals.predicted_total_runs, 2)} / ${formatNumber(totals.market_total, 1)}</div><div class="data-copy">Edge ${formatNumber(totals.edge, 3)} · ${escapeHtml(totals.model_name || "model")}</div></article>
          <article class="summary-card"><div class="data-label">Expected Runs</div><div class="summary-value">${escapeHtml(detail.away_team)} ${formatNumber(totals.away_expected_runs, 2)} / ${escapeHtml(detail.home_team)} ${formatNumber(totals.home_expected_runs, 2)}</div><div class="data-copy">Line move ${formatNumber(totals.line_movement, 2)}</div></article>
          <article class="summary-card"><div class="data-label">Weather</div><div class="summary-value">${formatNumber(weather.temperature_f, 0)}F</div><div class="data-copy">Wind ${formatNumber(weather.wind_speed_mph, 0)} mph · Humidity ${formatPercent(numberOr(weather.humidity_pct) == null ? null : Number(weather.humidity_pct) / 100, 0)}</div></article>
          <article class="summary-card"><div class="data-label">Lineup Quality</div><div class="summary-value">${formatPercent(totals.away_lineup_k_pct)} / ${formatPercent(totals.home_lineup_k_pct)}</div><div class="data-copy">Away/Home lineup K% vs starters</div></article>
        `;
        document.getElementById("starterGrid").innerHTML = [
          starterCard(detail.starters?.away, detail.away_team, detail.home_team),
          starterCard(detail.starters?.home, detail.home_team, detail.away_team),
        ].join("");
        document.getElementById("lineupGrid").innerHTML = [
          lineupPanel(detail.teams?.away || {}),
          lineupPanel(detail.teams?.home || {}),
        ].join("");
        const notes = [
          `Venue run factor ${formatNumber(totals.venue_run_factor, 2)} and HR factor ${formatNumber(totals.venue_hr_factor, 2)} are already baked into the totals context.`,
          `Bullpen snapshot: away ${formatNumber(totals.away_bullpen_pitches_last3, 0)} pitches / ${formatNumber(totals.away_bullpen_innings_last3, 1)} IP / ${formatNumber(totals.away_bullpen_runs_allowed_last3, 0)} runs allowed, home ${formatNumber(totals.home_bullpen_pitches_last3, 0)} pitches / ${formatNumber(totals.home_bullpen_innings_last3, 1)} IP / ${formatNumber(totals.home_bullpen_runs_allowed_last3, 0)} runs allowed.`,
          actual.is_final ? `Final result: ${detail.away_team} ${actual.away_runs ?? "-"}, ${detail.home_team} ${actual.home_runs ?? "-"}.` : `Outcome is still pending for this matchup.`,
        ];
        document.getElementById("notesStack").innerHTML = notes.map((note) => `<div class="data-row"><span class="data-value">${escapeHtml(note)}</span></div>`).join("");
      }

      async function loadDetail() {
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get("game_id");
        const targetDate = params.get("target_date") || localDateValue();
        const includeInferred = params.get("include_inferred") || "true";
        document.getElementById("targetDate").value = targetDate;
        document.getElementById("backToBoardLink").href = appUrl(`?target_date=${encodeURIComponent(targetDate)}`);
        if (!gameId) {
          throw new Error("Missing game_id in the matchup page URL.");
        }
        const response = await fetch(appUrl(`api/games/${encodeURIComponent(gameId)}/detail?target_date=${encodeURIComponent(targetDate)}&include_inferred=${encodeURIComponent(includeInferred)}`));
        if (!response.ok) {
          throw new Error(`Game detail request failed: ${response.status}`);
        }
        const payload = await response.json();
        if (!payload.game) {
          throw new Error("No game detail was returned for this matchup.");
        }
        renderSummary(payload.game);
      }

      async function refreshForDate() {
        const params = new URLSearchParams(window.location.search);
        params.set("target_date", document.getElementById("targetDate").value || localDateValue());
        window.location.search = params.toString();
      }

      applyAppLinks();
      document.getElementById("targetDate").addEventListener("change", refreshForDate);
      document.getElementById("summaryGrid").innerHTML = '<article class="summary-card loading-card">Loading matchup summary…</article>';
      document.getElementById("starterGrid").innerHTML = '<article class="starter-card loading-card">Loading starter detail…</article>';
      document.getElementById("lineupGrid").innerHTML = '<article class="lineup-panel loading-card">Loading lineup detail…</article>';
      loadDetail().catch((error) => {
        const message = escapeHtml(error instanceof Error ? error.message : String(error));
        document.getElementById("heroTitle").textContent = "Matchup detail unavailable";
        document.getElementById("heroCopy").textContent = message;
        document.getElementById("summaryGrid").innerHTML = `<article class="summary-card loading-card">${message}</article>`;
        document.getElementById("starterGrid").innerHTML = "";
        document.getElementById("lineupGrid").innerHTML = "";
        document.getElementById("notesStack").innerHTML = `<div class="data-row"><span class="data-value">${message}</span></div>`;
      });
    </script>
  </body>
</html>
