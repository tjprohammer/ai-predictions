# Build Windows installer / portable ZIP and attach to the published GitHub Release.
# Prerequisite: create a Release from a tag (e.g. v0.2.0-beta5); this workflow runs on publish.
#
# Bundled SQLite is schema-only (no exported history from Postgres). Users get a working app shell;
# for a fully seeded desktop DB, developers still run scripts/build_desktop_sqlite_seed.py locally.

name: MLB Predictor Windows release

on:
  release:
    types: [published]

permissions:
  contents: write

defaults:
  run:
    working-directory: mlb-predictor

jobs:
  windows_release:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: Add Inno Setup to PATH
        shell: pwsh
        run: |
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Prepare SQLite schema (CI; no Postgres seed export)
        run: python scripts/ci_prepare_desktop_sqlite.py

      - name: Set DATABASE_URL to project SQLite
        shell: pwsh
        run: |
          $p = (Resolve-Path "db\mlb_predictor.sqlite3").Path.Replace("\", "/")
          "DATABASE_URL=sqlite:///$p" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Windows release artifacts
        run: >
          python scripts/build_windows_release.py
          --app-version ${{ github.event.release.tag_name }}
          --allow-incomplete-sqlite-seed

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            mlb-predictor/release/*.exe
            mlb-predictor/release/*.zip
            mlb-predictor/release/*-checksums.txt
            mlb-predictor/release/*-manifest.json
            mlb-predictor/release/*-release-notes.md
          fail_on_unmatched_files: false
